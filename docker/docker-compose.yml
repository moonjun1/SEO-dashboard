version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: seo-dashboard-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: seo_dashboard
      POSTGRES_USER: seo_user
      POSTGRES_PASSWORD: seo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo_user -d seo_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seo-dashboard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
