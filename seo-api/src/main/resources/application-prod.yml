spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10

# JWT secret MUST be provided via JWT_SECRET environment variable.
# The application will fail to start if a weak default is detected.

# CORS origins MUST be set via CORS_ALLOWED_ORIGINS env var.
# Example: CORS_ALLOWED_ORIGINS=https://yourdomain.com,https://www.yourdomain.com

# Swagger/OpenAPI disabled in production
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Actuator: only health exposed publicly, metrics on separate port
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  server:
    port: 9090

logging:
  level:
    com.seodashboard: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
